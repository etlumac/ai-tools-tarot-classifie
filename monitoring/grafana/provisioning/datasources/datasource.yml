apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus  # 🔑 Ключевое поле: должно совпадать с тем, что в дашборде
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
      queryTimeout: "30s"
      httpMethod: "POST"  # Лучше для больших запросов